<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HQ Proxy Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <h1>HQ Proxy Checker</h1>
    <p class="subtitle">Paste your proxies and check them</p>

    <div id="input-section">
      <label for="proxy-input">Proxies (one per line: <code>ip:port</code>)</label>
      <textarea id="proxy-input" rows="10" placeholder="1.2.3.4:8080&#10;5.6.7.8:3128&#10;9.10.11.12:1080"></textarea>

      <div class="options">
        <div class="toggle-group">
          <button class="toggle active" data-type="http">HTTP</button>
          <button class="toggle" data-type="https">HTTPS</button>
        </div>
        <button id="check-btn">Check</button>
      </div>
    </div>

    <div id="check-section" class="hidden">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <span id="progress-text">0 / 0</span>
      <div id="results">
        <div class="stats">
          <span class="stat working" id="stat-working">0 Working</span>
          <span class="stat dead" id="stat-dead">0 Dead</span>
        </div>
        <div id="result-list"></div>
      </div>
    </div>

    <div id="done-section" class="hidden">
      <label>Working Proxies</label>
      <textarea id="output" readonly></textarea>
      <div class="done-buttons">
        <button id="copy-btn">Copy All</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
